<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>The Great Friction: US-Iran History</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #1a1a1a; color: white; margin: 0; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 50px; }
        
        /* 관계 온도 게이지 */
        #gauge-container { width: 80%; height: 20px; background: #333; border-radius: 10px; margin: 30px 0; position: relative; }
        #gauge-bar { width: 50%; height: 100%; background: linear-gradient(to right, #3498db, #e74c3c); border-radius: 10px; transition: 1s ease-in-out; }
        #gauge-label { position: absolute; top: -25px; right: 0; font-weight: bold; color: #e74c3c; }

        /* 메인 시각화 영역 */
        #display-area { width: 80%; min-height: 400px; background: #222; border: 1px solid #444; border-radius: 20px; padding: 40px; text-align: center; transition: 0.5s; }
        h2 { color: #f1c40f; margin-bottom: 20px; }
        p { line-height: 1.6; font-size: 1.1em; color: #ccc; }

        /* 컨트롤 버튼 */
        .controls { margin-top: 30px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 10px 20px; border: none; border-radius: 5px; background: #444; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background: #666; transform: translateY(-3px); }
        button.active { background: #f1c40f; color: black; }

        .image-placeholder { width: 100%; height: 200px; background: #333; margin: 20px 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-style: italic; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌐 The Great Friction</h1>
    <p>미국-이란의 70년사: 석유, 혁명, 그리고 핵</p>

    <div id="gauge-container">
        <div id="gauge-label">관계 긴장도</div>
        <div id="gauge-bar"></div>
    </div>

    <div id="display-area">
        <h2 id="title">연도를 선택하여 역사를 확인하세요</h2>
        <div class="image-placeholder" id="image">데이터 시각화 레이어</div>
        <p id="description">버튼을 클릭하면 각 시대의 주요 사건과 데이터가 나타납니다.</p>
    </div>

    <div class="controls">
        <button onclick="updatePage(0)">1953: 아약스 작전</button>
        <button onclick="updatePage(1)">1960s: 백색 혁명</button>
        <button onclick="updatePage(2)">1979: 이란 혁명</button>
        <button onclick="updatePage(3)">2015: 핵 합의(JCPOA)</button>
        <button onclick="updatePage(4)">현재: 안개 속으로</button>
    </div>
</div>

<script>
    const historyData = [
        {
            title: "1953년: 영국의 석유 이권과 CIA",
            desc: "영국이 주도한 '아약스 작전'으로 모사데크 민주 정부가 무너집니다. 미국은 석유 이권을 위해 국왕(샤)을 복권시키며 개입을 시작합니다.",
            temp: 40,
            color: "#3498db",
            img: "🛢️ 석유 국유화 vs 외세의 개입"
        },
        {
            title: "1960-70년대: 황금기 동맹",
            desc: "미국과 이란은 중동 내 가장 강력한 혈맹이었습니다. 미국의 무기와 자본이 투입되었고, 이란은 서구화의 정점을 찍습니다.",
            temp: 10,
            color: "#2ecc71",
            img: "🤝 중동의 파리, 테헤란"
        },
        {
            title: "1979년: 거대한 결별",
            desc: "이슬람 혁명과 미 대사관 인질 사건으로 양국 관계는 완전히 파탄 납니다. 이때부터 미국은 이란을 '주적'으로 규정합니다.",
            temp: 95,
            color: "#e74c3c",
            img: "🔥 타오르는 미 대사관"
        },
        {
            title: "2015년: 일시적 해빙기",
            desc: "오바마 행정부 시절, 극적인 핵 합의가 이뤄집니다. 경제 제재가 풀리고 관계 회복의 희망이 보였던 시기입니다.",
            temp: 30,
            color: "#f1c40f",
            img: "📜 서명된 핵 합의 문서"
        },
        {
            title: "현재: 반복되는 긴장",
            desc: "합의 파기와 재제재, 호르무즈 해협의 군사적 충돌이 반복됩니다. 역사는 여전히 팽팽한 평행선을 달리고 있습니다.",
            temp: 85,
            color: "#c0392b",
            img: "🚢 호르무즈 해협의 군사적 긴장"
        }
    ];

    function updatePage(index) {
        const data = historyData[index];
        document.getElementById('title').innerText = data.title;
        document.getElementById('description').innerText = data.desc;
        document.getElementById('gauge-bar').style.width = data.temp + "%";
        document.getElementById('gauge-bar').style.background = data.color;
        document.getElementById('image').innerText = data.img;
        
        // 버튼 활성화 스타일
        const buttons = document.querySelectorAll('button');
        buttons.forEach((btn, i) => {
            btn.classList.toggle('active', i === index);
        });
    }
</script>

</body>
</html>
