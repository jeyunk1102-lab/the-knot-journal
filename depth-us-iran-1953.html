<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>1953: 아약스 작전의 내막 | The Knot Journal</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Pretendard', sans-serif; }
        /* 지도 배경 */
        .map-stage { 
            position: relative; width: 100%; height: 600px; 
            background: url('middle-east-map-vintage.jpg') center/cover; /* 실제 지도 이미지 경로 */
            background-color: #1a1510; opacity: 0.8;
        }
        /* 캐릭터 스타일 */
        .character {
            position: absolute; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .character img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f1c40f; }
        .character span { display: block; margin-top: 5px; font-weight: bold; background: rgba(0,0,0,0.7); }
        
        /* 위치 선정 */
        #iran-leader { top: 40%; left: 60%; }
        #us-leader { top: 20%; left: 10%; }
        #uk-leader { top: 10%; left: 30%; }

        /* 대화창 */
        .dialogue-box {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(255,255,255,0.95); color: #000;
            padding: 30px; border-radius: 15px; display: none;
        }
    </style>
</head>
<body>

<div class="map-stage">
    <!-- 이란: 모사데크 -->
    <div class="character" id="iran-leader" onclick="showStory('mosaddegh')">
        <div style="font-size: 50px;">🇮🇷</div>
        <span>모사데크 총리</span>
    </div>
    <!-- 미국: 아이젠하워 -->
    <div class="character" id="us-leader" onclick="showStory('ike')">
        <div style="font-size: 50px;">🇺🇸</div>
        <span>아이젠하워 대통령</span>
    </div>
    <!-- 영국: 처칠 -->
    <div class="character" id="uk-leader" onclick="showStory('churchill')">
        <div style="font-size: 50px;">🇬🇧</div>
        <span>처칠 수상</span>
    </div>
</div>

<div id="dialogue" class="dialogue-box">
    <h3 id="d-name">인물 이름</h3>
    <p id="d-text">사건의 내막...</p>
    <button onclick="document.getElementById('dialogue').style.display='none'">닫기</button>
</div>

<script>
    const stories = {
        mosaddegh: { name: "모하마드 모사데크", text: "우리의 석유는 우리의 것입니다! 영국에 착취당하던 석유 자원을 국유화하여 이란의 주권을 되찾겠습니다." },
        ike: { name: "드와이트 아이젠하워", text: "중동이 공산화되는 것을 막아야 합니다. 영국의 요청을 받아들여, CIA를 투입해 정권을 교체하기로 결정했습니다. (코드명: 아약스 작전)" },
        churchill: { name: "윈스턴 처칠", text: "이란의 석유 국유화는 대영제국의 이익에 대한 도전입니다. 미국을 설득해 모사데크를 몰아내야 합니다." }
    };

    function showStory(id) {
        const d = document.getElementById('dialogue');
        document.getElementById('d-name').innerText = stories[id].name;
        document.getElementById('d-text').innerText = stories[id].text;
        d.style.display = 'block';
    }
</script>

</body>
</html>
