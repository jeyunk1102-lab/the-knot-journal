<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US-Iran Relation | The Knot Journal</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #0f0f0f; color: #fff; margin: 0; line-height: 1.6; -webkit-font-smoothing: antialiased; }
        .nav-back { padding: 20px 40px; background: rgba(15,15,15,0.8); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 10; box-sizing: border-box; }
        .nav-back a { color: #f1c40f; text-decoration: none; font-size: 14px; font-weight: bold; letter-spacing: 1px; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 140px 20px 60px 20px; }
        header { text-align: center; margin-bottom: 50px; }
        header h1 { font-size: clamp(32px, 5vw, 52px); margin-bottom: 15px; letter-spacing: -2px; line-height: 1.2; }
        header .sub-tag { color: #e74c3c; font-weight: bold; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }

        /* 데이터 시각화 보드 */
        .viz-board { background: #161616; border: 1px solid #262626; border-radius: 24px; padding: 40px; margin-bottom: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
        .status-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; min-height: 39px; }
        .status-title { font-size: 14px; color: #888; font-weight: 500; }
        #tension-label { font-size: 26px; font-weight: 900; color: #f1c40f; transition: color 0.5s; }

        .progress-bg { height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin-bottom: 50px; }
        #tension-fill { width: 0%; height: 100%; background: #222; transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); }

        #content-area { text-align: center; min-height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .era-icon { font-size: 80px; margin-bottom: 20px; display: block; }
        .era-icon.float { animation: float 3s ease-in-out infinite; }
        #era-title { font-size: 34px; margin: 0 0 15px 0; font-weight: 800; letter-spacing: -1px; }
        #era-desc { font-size: 18px; color: #aaa; word-break: keep-all; max-width: 650px; margin: 0 auto 30px auto; line-height: 1.7; }

        /* 타임라인 컨트롤 스타일 */
        .timeline-wrapper { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; justify-content: center; width: 100%; margin-top: 20px; }
        .btn-time { padding: 12px 28px; border: 1px solid #333; background: #111; color: #888; border-radius: 30px; cursor: pointer; white-space: nowrap; transition: all 0.3s; font-size: 15px; font-weight: 600; }
        .btn-time:hover { border-color: #f1c40f; color: #fff; }
        .btn-time.active { background: #f1c40f; color: #000; border-color: #f1c40f; font-weight: bold; box-shadow: 0 0 20px rgba(241, 196, 15, 0.3); }

        footer { text-align: center; color: #444; font-size: 12px; margin-top: 80px; padding: 40px; border-top: 1px solid #1a1a1a; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
