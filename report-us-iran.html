<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US-Iran Relation | The Knot Journal</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #0f0f0f; color: #fff; margin: 0; line-height: 1.6; }
        .nav-back { padding: 20px 40px; background: rgba(0,0,0,0.5); position: fixed; width: 100%; top: 0; z-index: 10; }
        .nav-back a { color: #f1c40f; text-decoration: none; font-size: 14px; font-weight: bold; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 120px 20px 60px 20px; }
        header { text-align: center; margin-bottom: 60px; }
        header h1 { font-size: clamp(32px, 5vw, 52px); margin-bottom: 15px; letter-spacing: -2px; color: #fff; }
        header .sub-tag { color: #e74c3c; font-weight: bold; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }

        /* 데이터 시각화 보드 */
        .viz-board { background: #181818; border: 1px solid #282828; border-radius: 24px; padding: 40px; margin-bottom: 40px; }
        .status-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .status-title { font-size: 13px; color: #888; }
        #tension-label { font-size: 24px; font-weight: 900; color: #f1c40f; }

        .progress-bg { height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-bottom: 40px; }
        #tension-fill { width: 10%; height: 100%; background: #2ecc71; transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1); }

        #content-area { text-align: center; min-height: 250px; }
        .era-icon { font-size: 72px; margin-bottom: 20px; display: block; }
        #era-title { font-size: 32px; margin: 0 0 15px 0; color: #fff; }
        #era-desc { font-size: 18px; color: #aaa; word-break: keep-all; max-width: 600px; margin: 0 auto 30px auto; }

        /* 타임라인 컨트롤 */
        .timeline-wrapper { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; justify-content: center; }
        .btn-time { padding: 12px 24px; border: 1px solid #333; background: #111; color: #666; border-radius: 30px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .btn-time:hover { border-color: #f1c40f; color: #fff; }
        .btn-time.active { background: #f1c40f; color: #000; border-color: #f1c40f; font-weight: bold; }

        footer { text-align: center; color: #444; font-size: 12px; margin-top: 80px; padding: 40px; border-top: 1px solid #1a1a1a; }
    </style>
</head>
<body>

<div class="nav-back">
    <a href="index.html">← THE KNOT JOURNAL</a>
</div>

<div class="container">
    <header>
        <span class="sub-tag">Geopolitical Visual Report</span>
        <h1>The Great Friction:<br>US & Iran</h1>
    </header>

    <div class="viz-board">
        <div class="status-header">
            <span class="status-title">관계 긴장 지수 (Tension Index)</span>
            <span id="tension-label">평온</span>
        </div>
        <div class="progress-bg">
            <div id="tension-fill"></div>
        </div>

        <div id="content-area">
            <span class="era-icon" id="icon">🌐</span>
            <h2 id="era-title">연도를 선택하세요</h2>
            <p id="era-desc">70년 전 영국의 석유 이권 다툼, 그 끝에 남은 현재의 갈등을 확인해 보세요.</p>
        </div>

        <div class="timeline-wrapper">
            <button class="btn-time active" onclick="update(0)">1953</button>
            <button class="btn-time" onclick="update(1)">1960s</button>
            <button class="btn-time" onclick="update(2)">1979</button>
            <button class="btn-time" onclick="update(3)">2015</button>
            <button class="btn-time" onclick="update(4)">Present</button>
        </div>
    </div>

    <p style="color: #555; text-align: center; font-style: italic;">* 데이터 저널리즘을 위해 UN 및 국제 기록 보관소의 자료를 시각화했습니다.</p>
</div>

<footer>
    &copy; 2026 The Knot Journal. Focused on Data-Driven Insights.
</footer>

<script>
    const data = [
        { 
            title: "1953: 아약스 작전", 
            desc: "영국과 미국 CIA가 이란의 민주 정권을 무너뜨리고 국왕을 복권시켰습니다. 갈등의 첫 번째 매듭입니다.", 
            tension: 45, label: "주의", icon: "🛢️", color: "#e67e22",
            link: "depth-us-iran-1953.html" // 상세 페이지 경로
        },
        { 
            title: "1960-70s: 동맹의 시대", 
            desc: "미국 무기와 이란 석유가 오가던 시절입니다. 중동 내 미국의 가장 강력한 우방이었습니다.", 
            tension: 15, label: "평온", icon: "🤝", color: "#2ecc71",
            link: "depth-golden-era.html"
        },
        // ... 나머지 데이터 동일하게 유지
    ];

    function update(i) {
        const item = data[i];
        document.getElementById('era-title').innerText = item.title;
        document.getElementById('era-desc').innerText = item.desc;
        document.getElementById('icon').innerText = item.icon;
        document.getElementById('tension-label').innerText = item.label;
        document.getElementById('tension-label').style.color = item.color;
        
        const fill = document.getElementById('tension-fill');
        fill.style.width = item.tension + "%";
        fill.style.background = item.color;

        // 상세 페이지 이동 버튼 동적 생성
        const contentArea = document.getElementById('content-area');
        let detailBtn = document.getElementById('detail-btn');
        
        if (!detailBtn) {
            detailBtn = document.createElement('a');
            detailBtn.id = 'detail-btn';
            detailBtn.className = 'detail-link'; // 스타일은 아래 CSS 참고
            contentArea.appendChild(detailBtn);
        }
        
        detailBtn.href = item.link;
        detailBtn.innerHTML = `🔍 ${item.title}의 내막 자세히 보기`;
        detailBtn.style.display = "inline-block";
        detailBtn.style.marginTop = "20px";
        detailBtn.style.color = item.color;
        detailBtn.style.textDecoration = "none";
        detailBtn.style.fontWeight = "bold";
        detailBtn.style.border = `1px solid ${item.color}`;
        detailBtn.style.padding = "10px 20px";
        detailBtn.style.borderRadius = "20px";

        const btns = document.querySelectorAll('.btn-time');
        btns.forEach((b, idx) => b.classList.toggle('active', idx === i));
    }
</script>

</body>
</html>
